<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旋律創作器 Pro Max</title>
<style>
  :root {
    --bg-color: #0f0f17;
    --panel-bg: rgba(255, 255, 255, 0.05);
    --accent: #7c4dff;
    /* 音高顏色定義 */
    --c-d: #ff1744; /* 紅色 (d 和 d' 共用) */
    --c-r: #ff9100; /* 橙色 */
    --c-m: #ffea00; /* 黃色 */
    --c-f: #00e676; /* 綠色 */
    --c-s: #00e5ff; /* 藍色 */
    --c-l: #2979ff; /* 靛色 */
    --c-t: #d500f9; /* 紫色 */
  }

  body {
    font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
    background: radial-gradient(circle at center, #1e1e2f 0%, var(--bg-color) 100%);
    color: white;
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
  }

  /* --- 主選單 --- */
  #main-menu {
    text-align: center;
    transition: opacity 0.5s;
  }

  .main-title {
    font-size: 3.5rem;
    margin-bottom: 30px;
    background: linear-gradient(45deg, #00e5ff, #7c4dff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 15px rgba(124, 77, 255, 0.5));
  }

  .big-btn {
    padding: 20px 50px;
    font-size: 1.5rem;
    border: none;
    border-radius: 50px;
    background: var(--accent);
    color: white;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(124, 77, 255, 0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .big-btn:hover { transform: scale(1.05); box-shadow: 0 15px 40px rgba(124, 77, 255, 0.6); }

  /* --- 創作器內頁 --- */
  #app-container {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 95%;
    max-width: 1200px;
    animation: fadeIn 0.5s ease-out;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .config-panel {
    background: var(--panel-bg);
    padding: 20px;
    border-radius: 20px;
    display: flex;
    gap: 20px;
    margin-bottom: 25px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }

  .config-group { display: flex; align-items: center; gap: 10px; font-size: 15px; }
  
  select {
    padding: 8px 15px;
    border-radius: 10px;
    background: #2a2a3d;
    color: white;
    border: 1px solid var(--accent);
    outline: none;
    cursor: pointer;
  }

  /* 速度滑桿樣式 */
  input[type="range"] {
    accent-color: var(--accent);
    cursor: pointer;
  }
  #bpm-display {
    display: inline-block;
    width: 35px;
    text-align: right;
    font-weight: bold;
    color: var(--accent);
  }

  /* --- 網格區域 --- */
  .grid-scroll-wrapper {
    width: 100%;
    overflow-x: auto;
    padding-bottom: 15px;
    margin-bottom: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) transparent;
  }

  #grid {
    display: grid;
    gap: 8px;
    margin: 0 auto;
    width: max-content;
  }

  .cell {
    width: 50px; height: 50px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.1);
    transition: all 0.2s;
    user-select: none;
  }

  .cell:hover { background: rgba(255, 255, 255, 0.15); }

  /* 動態類別：根據 Row 設定顏色 */
  .cell.active[data-note="d"] { background: var(--c-d); box-shadow: 0 0 15px var(--c-d); color: white; }
  .cell.active[data-note="r"] { background: var(--c-r); box-shadow: 0 0 15px var(--c-r); color: white; }
  .cell.active[data-note="m"] { background: var(--c-m); box-shadow: 0 0 15px var(--c-m); color: #333; }
  .cell.active[data-note="f"] { background: var(--c-f); box-shadow: 0 0 15px var(--c-f); color: white; }
  .cell.active[data-note="s"] { background: var(--c-s); box-shadow: 0 0 15px var(--c-s); color: white; }
  .cell.active[data-note="l"] { background: var(--c-l); box-shadow: 0 0 15px var(--c-l); color: white; }
  .cell.active[data-note="t"] { background: var(--c-t); box-shadow: 0 0 15px var(--c-t); color: white; }
  .cell.active[data-note="d'"] { background: var(--c-d); box-shadow: 0 0 15px var(--c-d); color: white; } /* d' 改為紅色 */

  /* 播放特效 */
  .cell.playing-column { background: rgba(255, 255, 255, 0.15); }
  .cell.active.hit { transform: scale(1.2); filter: brightness(1.5); }

  /* 控制按鈕 */
  .bottom-controls { display: flex; gap: 15px; }
  button.action-btn {
    padding: 12px 30px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
    text-transform: uppercase;
  }
  .play { background: #00e676; color: #111; }
  .stop { background: #ff1744; color: white; }
  .reset { background: #757575; color: white; }
  .back { background: transparent; color: #aaa; border: 1px solid #aaa; }
  
  button:hover { opacity: 0.8; transform: translateY(-2px); }
</style>
</head>
<body>

  <div id="main-menu">
    <h1 class="main-title">旋律創作器</h1>
    <button class="big-btn" onclick="openApp()">進入創作器</button>
  </div>

  <div id="app-container">
    <div class="config-panel">
      <div class="config-group">
        <label>音階：</label>
        <select id="scale-select" onchange="initGrid()">
          <option value="ds">d - s (5音)</option>
          <option value="penta">五聲音階 (d r m s l)</option>
          <option value="major">大調音階 (d r m f s l t d')</option>
        </select>
      </div>
      <div class="config-group">
        <label>長度：</label>
        <select id="length-select" onchange="initGrid()">
          <option value="5">5 拍</option>
          <option value="8">8 拍</option>
          <option value="16">16 拍</option>
          <option value="24">24 拍</option>
          <option value="32">32 拍</option>
        </select>
      </div>
      <div class="config-group">
        <label>音色：</label>
        <select id="wave-select">
          <option value="sine">純淨音 (Sine)</option>
          <option value="triangle">木琴音 (Triangle)</option>
          <option value="square">復古遊戲 (Square)</option>
          <option value="sawtooth">合成器 (Sawtooth)</option>
        </select>
      </div>
      <div class="config-group">
        <label>速度：<span id="bpm-display">120</span></label>
        <input type="range" id="bpm-slider" min="60" max="240" value="120" oninput="updateBPM()">
      </div>
    </div>

    <div class="grid-scroll-wrapper">
      <div id="grid"></div>
    </div>

    <div class="bottom-controls">
      <button class="action-btn back" onclick="backToMenu()">返回主選單</button>
      <button class="action-btn reset" onclick="resetGrid()">重置</button>
      <button class="action-btn stop" onclick="stopSequence()">停止</button>
      <button class="action-btn play" id="playBtn">▶ 播放</button>
    </div>
  </div>

<script>
  let audioCtx;
  const gridEl = document.getElementById('grid');
  const appContainer = document.getElementById('app-container');
  const mainMenu = document.getElementById('main-menu');

  // 音符頻率表
  const freqTable = {
    "d'": 523.25, "t": 493.88, "l": 440.00, "s": 392.00,
    "f": 349.23, "m": 329.63, "r": 293.66, "d": 261.63
  };

  // 音階定義
  const scales = {
    ds: ["s", "f", "m", "r", "d"],
    major: ["d'", "t", "l", "s", "f", "m", "r", "d"],
    penta: ["l", "s", "m", "r", "d"]
  };

  let cells = [];
  let isPlaying = false;
  let timer;

  function openApp() {
    mainMenu.style.display = 'none';
    appContainer.style.display = 'flex';
    initGrid();
  }

  function backToMenu() {
    stopSequence();
    appContainer.style.display = 'none';
    mainMenu.style.display = 'block';
  }

  // 更新 BPM 顯示
  function updateBPM() {
    const bpm = document.getElementById('bpm-slider').value;
    document.getElementById('bpm-display').innerText = bpm;
  }

  function initGrid() {
    stopSequence();
    const scaleKey = document.getElementById('scale-select').value;
    const length = parseInt(document.getElementById('length-select').value);
    const activeScale = scales[scaleKey];

    gridEl.innerHTML = '';
    gridEl.style.gridTemplateColumns = `repeat(${length}, 50px)`;
    cells = [];

    for (let r = 0; r < activeScale.length; r++) {
      for (let c = 0; c < length; c++) {
        const cell = document.createElement('div');
        cell.classList.add('cell');
        const noteName = activeScale[r];
        cell.dataset.note = noteName;
        cell.dataset.row = r;
        cell.dataset.col = c;
        cell.innerText = noteName;
        
        cell.addEventListener('mousedown', () => toggleCell(cell, c));
        gridEl.appendChild(cell);
        cells.push(cell);
      }
    }
  }

  function toggleCell(selectedCell, colIndex) {
    initAudio();
    const wasActive = selectedCell.classList.contains('active');
    
    // 清除同一列
    cells.forEach(c => {
      if (parseInt(c.dataset.col) === colIndex) {
        c.classList.remove('active');
      }
    });

    if (!wasActive) {
      selectedCell.classList.add('active');
      playTone(freqTable[selectedCell.dataset.note]);
    }
  }

  function resetGrid() {
    stopSequence();
    cells.forEach(c => c.classList.remove('active', 'playing-column', 'hit'));
  }

  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  // 播放音符 (加入音色判斷)
  function playTone(freq) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    // 獲取當前選取的音色波形
    const waveType = document.getElementById('wave-select').value;
    osc.type = waveType;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    
    // 設定波封 (Envelope)
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    
    // 針對比較尖銳的波形 (Square, Sawtooth) 調低音量以免刺耳
    if (waveType === 'square' || waveType === 'sawtooth') {
      gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
    } else {
      gain.gain.linearRampToValueAtTime(0.6, audioCtx.currentTime + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
    }

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.8);
  }

  async function startPlayback() {
    if (isPlaying) return;
    initAudio();
    isPlaying = true;
    const length = parseInt(document.getElementById('length-select').value);
    
    for (let step = 0; step < length; step++) {
      if (!isPlaying) break;

      cells.forEach(c => c.classList.remove('playing-column', 'hit'));

      const colCells = cells.filter(c => parseInt(c.dataset.col) === step);
      colCells.forEach(c => {
        c.classList.add('playing-column');
        if (c.classList.contains('active')) {
          c.classList.add('hit');
          playTone(freqTable[c.dataset.note]);
        }
      });

      if (step > 4) {
        colCells[0].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }

      // 計算速度：60000 毫秒除以 BPM = 每拍的毫秒數
      const currentBpm = parseInt(document.getElementById('bpm-slider').value);
      const speedMs = 60000 / currentBpm;

      await new Promise(r => timer = setTimeout(r, speedMs));
    }
    stopSequence();
  }

  function stopSequence() {
    isPlaying = false;
    clearTimeout(timer);
    cells.forEach(c => c.classList.remove('playing-column', 'hit'));
  }

  document.getElementById('playBtn').addEventListener('click', startPlayback);
</script>
</body>
</html>
